<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakes & Crunches - Customer Allergy & Dietary Preference Profile System</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bakery: {
                            50: '#FAF6F0',   /* Soft Cream */
                            100: '#F4E2D8',
                            500: '#D47B50',  /* Warm Orange */
                            600: '#B85F35',
                            700: '#904E35',  /* Chocolate Brown */
                            800: '#733D29',
                            900: '#1d110d',  /* Espresso */
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- React & React DOM (UMD Production) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- React Router DOM (UMD Production) -->
    <script src="https://unpkg.com/@remix-run/router@1.6.2/dist/router.umd.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-router@6.11.2/dist/umd/react-router.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-router-dom@6.11.2/dist/umd/react-router-dom.production.min.js" crossorigin></script>
    
    <!-- Axios CDN -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <!-- jsPDF and jsPDF-AutoTable CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Babel Standalone (for JSX compilation in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset('react', {
        presets: [
          [Babel.availablePresets['react'], { runtime: 'classic' }]
        ]
      });
    </script>
</head>
<body class="bg-bakery-50 text-bakery-900 transition-colors duration-200">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen bg-bakery-50">
            <div class="text-center">
                <div class="inline-block w-16 h-16 border-4 border-bakery-500 border-t-transparent rounded-full animate-spin"></div>
                <h1 class="mt-4 text-xl font-semibold text-bakery-700">Loading Cakes & Crunches System...</h1>
            </div>
        </div>
    </div>

    <!-- React App JS (Loaded with type="text/babel") -->
    <script src="/static/js/app.js" type="text/babel"></script>
</body>
</html>
